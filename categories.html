    <style>
        /* تنسيق عام للصفحة */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }

        /* تنسيق الحاوية الرئيسية */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        /* تنسيق كل عنصر (دائرة + مربع) */
        .item {
            width: calc(50% - 10px); /* Ensure at least two items per row on small screens */
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* تنسيق الدائرة */
        .circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 10px;
            border: 2px solid #ccc;
        }

        .circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* تنسيق المربع (اسم الفئة) */
        .category-name {
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            color: #333;
        }

        /* Hover effect for the circle */
        .item:hover .circle {
            border: 2px solid red;
        }

        /* Media query for mobile devices - make items larger */
        @media (max-width: 649px) {
            .item {
                width: calc(50% - 10px);
            }

            .circle {
                width: 150px;
                height: 150px;
            }

            .category-name {
                font-size: 20px;
            }
        }

        /* Media query for screens larger than 650px - 3 items per row */
        @media (min-width: 650px) {
            .container {
                gap: 10px;
                padding: 0 20px;
            }

            .item {
                width: calc(33.33% - 13.33px); /* 3 items per row with gap accounting */
            }

            .circle {
                width: 150px;
                height: 150px;
            }

            .category-name {
                font-size: 18px;
                padding: 15px;
            }
        }

        /* For even larger screens, adjust item size if needed */
        @media (min-width: 768px) {
            .item {
                width: 200px; /* Fixed width for larger screens */
            }
        }
    </style>

    <script>
        // دالة لتوجيه المستخدم إلى صفحة sea.html وإضافة الاسم إلى صندوق البحث
        function redirectToSea(categoryName) {
            // توجيه المستخدم إلى صفحة sea.html
            window.location.href = `sea.html?search=${encodeURIComponent(categoryName)}`;
        }

        // دالة لتنفيذ البحث (يمكن استخدامها في صفحة sea.html)
        function performSearch(searchTerm) {
            const products = document.querySelectorAll('.product'); // جميع المنتجات

            products.forEach(product => {
                const productName = product.getAttribute('data-name').toLowerCase(); // اسم المنتج
                if (productName.includes(searchTerm.toLowerCase())) {
                    product.classList.remove('hidden'); // إظهار المنتج إذا تطابق
                } else {
                    product.classList.add('hidden'); // إخفاء المنتج إذا لم يتطابق
                }
            });
        }

        // عند تحميل الصفحة، تحقق من وجود معلمة بحث في الرابط
        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const searchTerm = urlParams.get('search');

            if (searchTerm) {
                const searchBox = document.getElementById('search-box');
                searchBox.value = searchTerm; // تعبئة صندوق البحث بالقيمة
                performSearch(searchTerm); // تنفيذ البحث
            }
        };
    </script>
