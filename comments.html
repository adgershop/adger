<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة مع زر الرجوع وحقل الرسالة</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background-color: #808080; /* لون رصاصي */
            border-radius: 50%; /* يجعل الزر دائريًا */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            text-decoration: none;
        }

        .message-container {
            margin-top: auto;
            padding: 20px;
            background-color: #f1f1f1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .message-input {
            width: calc(100% - 80px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .send-button {
            padding: 10px 20px;
            background-color: #4CAF50; /* لون أخضر */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- زر الرجوع للخلف -->
    <a href="#" class="back-button" onclick="history.back()">X</a>

    <!-- حقل الرسالة وزر الإرسال -->
    <div class="message-container">
        <input type="text" class="message-input" placeholder="اكتب رسالتك هنا...">
        <button class="send-button">إرسال</button>
    </div>

</body>
</html>
