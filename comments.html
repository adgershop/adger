<!DOCTYPE html>
<html>
<head>
    <title>Firebase Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-database.js"></script>
    <style>
        /* إضافة نمط للنص العلوي مع الخلفية الزرقاء */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        #topMessageContainer {
            background-color: hsl(0, 100%, 50%);
            color: white;
            padding: 15px;
            text-align: right;
            font-size: 15px;
            font-weight: bold;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background-image: linear-gradient(to right, hsl(0, 100%, 40%), hsl(0, 100%, 60%));
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.5), inset 0 0 10px rgba(255, 255, 255, 0.5);
        }
        #backArrow {
            background-color: #f0f0f0;
            border-radius: 50%;
            margin-right: 15px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s ease;
        }
        #backArrow:hover {
            background-color: #d9d9d9;
        }
        #backArrow svg {
            width: 24px;
            height: 24px;
            stroke: #000000;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative; /* Added for centering elements */
        }
        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }
        .message-container {
            margin-bottom: 10px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
        }
        .message-text {
            display: block;
            padding: 10px;
            border-radius: 5px;
            background-color: #f1f1f1;
        }
        .message-author {
            font-weight: bold;
        }
        .reply-text {
            margin-left: 20px;
            padding: 10px;
            border-radius: 5px;
            margin-top: 12px;
            background-color: #e1e1e1;
        }
        #inputContainer {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }
        #textInput {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-right: 10px;
        }
        #submitButton {
            padding: 10px 20px;
            border: none;
            background-color: #000000;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        #emptyState {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cairo', sans-serif;
            text-align: center;
        }
        #emptyState span {
            font-size: 48px; /* Increased size for better visibility */
        }
        #emptyState p {
            font-size: 24px;
            color: #666;
            margin: 0;
        }
        #loadingSpinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none; /* Initially hidden */
            justify-content: center;
            align-items: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- إضافة عنصر جديد لعرض النص العلوي -->
    <div id="topMessageContainer">
        <span id="topMessage">تعليقات ومحادثة</span>
        <div id="backArrow" onclick="window.history.back();" style="margin-left: 12px; margin-right: 2px;">
            <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                <path stroke="black" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m9 5 7 7-7 7"/>
            </svg>            
        </div>
    </div>
    
    <div id="messages"></div>
    <div id="emptyState">
        <span>📭</span>
        <p>لا توجد رسائل</p>
    </div>
    <div id="loadingSpinner">
        <div class="spinner"></div>
    </div>
    <div id="inputContainer">
        <input type="text" id="textInput" placeholder="Enter message" required>
        <button id="submitButton">Send</button>
    </div>
