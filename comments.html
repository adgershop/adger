<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة بسيطة</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            position: relative;
        }

        /* الخلفية الدائرية الرمادية في الزاوية العلوية اليمنى */
        .background-circle {
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            background-color: #808080; /* رمادي */
            border-radius: 50%;
            z-index: 1;
        }

        /* زر X */
        .close-button {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: #FFFFFF; /* أبيض */
            background-color: transparent;
            border: none;
            z-index: 2;
            cursor: pointer;
        }

        /* حقل الإدخال وزر الإرسال */
        .input-area {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        #textInput {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-right: 10px;
        }

        #submitButton {
            padding: 10px 20px;
            background-color: #000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="background-circle"></div>
    <button class="close-button">&times;</button>
    
    <div class="input-area">
        <input type="text" id="textInput" placeholder="أدخل النص هنا">
        <button id="submitButton">إرسال</button>
    </div>
</body>
</html>
