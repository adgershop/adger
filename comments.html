<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة مع زر الرجوع وحقل الرسالة</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            position: relative;
        }

        /* زر الرجوع للخلف */
        .back-button {
            position: fixed; /* جعل الزر ثابت */
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background-color: #808080; /* لون رصاصي */
            border-radius: 50%; /* يجعل الزر دائريًا */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            text-decoration: none;
            z-index: 1000; /* للتأكد من ظهوره فوق العناصر الأخرى */
        }

        /* حاوية الرسالة وزر الإرسال */
        .message-container {
            position: fixed; /* جعل الحاوية ثابتة */
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background-color: #f1f1f1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.1); /* إضافة ظل */
            z-index: 999; /* للتأكد من ظهورها فوق العناصر الأخرى */
        }

        /* حقل إدخال الرسالة */
        .message-input {
            width: calc(100% - 90px); /* عرض الحقل مع ترك مساحة لزر الإرسال */
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            margin-right: 10px; /* مسافة بين الحقل وزر الإرسال */
        }

        /* زر الإرسال */
        .send-button {
            padding: 10px 20px;
            background-color: #4CAF50; /* لون أخضر */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            height: 40px; /* ارتفاع زر الإرسال يساوي ارتفاع الحقل */
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- زر الرجوع للخلف -->
    <a href="#" class="back-button" onclick="history.back()">X</a>

    <!-- حقل الرسالة وزر الإرسال -->
    <div class="message-container">
        <input type="text" class="message-input" placeholder="اكتب رسالتك هنا...">
        <button class="send-button">إرسال</button>
    </div>

</body>
</html>
