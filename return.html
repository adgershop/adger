    <!DOCTYPE html>
    <html lang="ar" dir="rtl">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
        <meta charset="UTF-8">

        <title>طلب استرجاع</title>
        <style>
            /* تنسيقات عامة */
            body {
                font-family: 'Arial', sans-serif;
                margin: 0;
                padding: 20px;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                position: relative;
                overflow: hidden;
                background: linear-gradient(45deg, #0d1b2a, #1b263b);
            }
    
            /* تأثير الخلفية ثلاثية الأبعاد */
            .background-3d {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                perspective: 1000px;
            }
    
            .cube {
                position: absolute;
                width: 50px;
                height: 50px;
                transform-style: preserve-3d;
                animation: rotate 10s infinite linear;
            }
    
            .cube div {
                position: absolute;
                width: 100%;
                height: 100%;
                background: rgba(0, 81, 255, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
    
            .cube .front  { transform: translateZ(25px); }
            .cube .back   { transform: translateZ(-25px); }
            .cube .right  { transform: rotateY(90deg) translateZ(25px); }
            .cube .left   { transform: rotateY(-90deg) translateZ(25px); }
            .cube .top    { transform: rotateX(90deg) translateZ(25px); }
            .cube .bottom { transform: rotateX(-90deg) translateZ(25px); }
    
            .cube:nth-child(1) { top: 10%; left: 10%; animation-duration: 8s; }
            .cube:nth-child(2) { top: 20%; left: 70%; animation-duration: 12s; }
            .cube:nth-child(3) { top: 60%; left: 20%; animation-duration: 10s; }
            .cube:nth-child(4) { top: 80%; left: 80%; animation-duration: 15s; }
            .cube:nth-child(5) { top: 40%; left: 50%; animation-duration: 9s; }
    
            @keyframes rotate {
                0% { transform: rotateX(0deg) rotateY(0deg); }
                100% { transform: rotateX(360deg) rotateY(360deg); }
            }
    
            /* شاشة التحميل */
            .loader {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
                background: rgba(0, 0, 0, 0.3);
            }
    
            .loader::after {
                content: "";
                width: 50px;
                height: 50px;
                border: 5px solid #0051ff;
                border-top-color: transparent;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
    
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
    
            /* تنسيقات النموذج */
            .return-container {
                background-color: rgba(255, 255, 255, 0.95);
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                width: 100%;
                max-width: 400px;
                text-align: center;
                display: none;
                margin-top: 22px;
                transition: transform 0.3s ease;
                position: relative;
                z-index: 10;
            }
    
         
    
            .title-header {
                color: #2c3e50;
                font-size: 24px;
                margin-bottom: 30px;
                font-weight: bold;
                font-family: 'Cairo', sans-serif;
            }
    
            .input-group {
                margin-bottom: 20px;
                text-align: right;
            }
    
            .field-label {
                display: block;
                margin-bottom: 8px;
                color: #34495e;
                font-weight: bold;
                font-size: 16px;
            }
    
            .input-field {
                width: 100%;
                padding: 12px 15px;
                margin: 0 auto;
                border: 2px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
                font-size: 16px;
                transition: border-color 0.3s ease;
                text-align: right;
            }
    
            .input-field:focus {
                border-color: #0004ff;
                outline: none;
                box-shadow: 0 0 5px rgba(40, 167, 69, 0.3);
            }
    
            .submit-button {
                background-color: #0051ff;
                color: white;
                padding: 12px 15px;
                border: none;
                border-radius: 6px;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                width: 100%;
                transition: background-color 0.3s ease;
            }
    
            .submit-button:hover {
                background-color: #003bb3;
            }
    
            .form-content {
                padding: 0 10px;
            }
    
            .error-message {
                color: red;
                font-size: 14px;
                margin-top: 8px;
                display: none;
            }
    
            @media (max-width: 600px) {
                .return-container {
                    padding: 20px;
                    max-width: 90%;
                }
    
                .title-header {
                    font-size: 24px;
                    margin-bottom: 20px;
                }
    
                .input-field {
                    padding: 12px 15px;
                    font-size: 14px;
                }
    
                .submit-button {
                    padding: 12px 15px;
                    font-size: 14px;
                }
    
                .field-label {
                    font-size: 14px;
                }
    
                .error-message {
                    font-size: 12px;
                }
            }
    
            @media (max-width: 400px) {
                .return-container {
                    padding: 15px;
                    max-width: 95%;
                }
    
                .title-header {
                    font-size: 20px;
                    margin-bottom: 15px;
                }
    
                .input-field {
                    padding: 10px 12px;
                    font-size: 12px;
                }
    
                .submit-button {
                    padding: 10px 12px;
                    font-size: 12px;
                }
    
                .field-label {
                    font-size: 12px;
                }
    
                .error-message {
                    font-size: 10px;
                }
            }
        </style>
    </head>
    <body>
        <!-- الخلفية ثلاثية الأبعاد -->
        <div class="background-3d">
            <div class="cube"><div class="front"></div><div class="back"></div><div class="right"></div><div class="left"></div><div class="top"></div><div class="bottom"></div></div>
            <div class="cube"><div class="front"></div><div class="back"></div><div class="right"></div><div class="left"></div><div class="top"></div><div class="bottom"></div></div>
            <div class="cube"><div class="front"></div><div class="back"></div><div class="right"></div><div class="left"></div><div class="top"></div><div class="bottom"></div></div>
            <div class="cube"><div class="front"></div><div class="back"></div><div class="right"></div><div class="left"></div><div class="top"></div><div class="bottom"></div></div>
            <div class="cube"><div class="front"></div><div class="back"></div><div class="right"></div><div class="left"></div><div class="top"></div><div class="bottom"></div></div>
        </div>
    
        <!-- شاشة التحميل -->
        <div class="loader" id="loader"></div>
    
        <!-- النموذج -->
        <div class="return-container" id="returnContainer">
            <h1 class="title-header">طلب استرجاع</h1>
            <form id="returnForm" class="form-content">
                <div class="input-group">
                    <label for="name" class="field-label">ادخل اسمك:</label>
                    <input type="text" id="name" name="name" class="input-field" placeholder="الاسم" required>
                    <p id="name-error" class="error-message">يرجى ملء الحقل</p>
                </div>
    
                <div class="input-group">
                    <label for="phone" class="field-label">ادخل رقم الهاتف:</label>
                    <input type="tel" id="phone" name="phone" class="input-field" placeholder="رقم الهاتف" required>
                    <p id="phone-error" class="error-message">يرجى ملء الحقل</p>
                </div>
    
                <div class="input-group">
                    <label for="productNumber" class="field-label">ادخل رقم المنتج:</label>
                    <input type="text" id="productNumber" name="productNumber" class="input-field" placeholder="رقم المنتج" required>
                    <p id="productNumber-error" class="error-message">يرجى ملء الحقل</p>
                </div>
    
                <button type="button" class="submit-button" onclick="validateForm()">موافق</button>
            </form>
        </div>
    
        <script>
            // إخفاء شاشة التحميل وإظهار النموذج بعد اكتمال تحميل الصفحة
            document.addEventListener('DOMContentLoaded', function() {
                const loader = document.getElementById('loader');
                const returnContainer = document.getElementById('returnContainer');
    
                // إخفاء شاشة التحميل وإظهار النموذج بعد تأخير بسيط
                setTimeout(() => {
                    loader.style.display = 'none';
                    returnContainer.style.display = 'block';
                }, 1000); // يمكنك تغيير المدة أو إزالتها
    
                // تحميل البيانات المحفوظة
                const savedName = localStorage.getItem('name');
                const savedPhone = localStorage.getItem('phone');
                if (savedName) document.getElementById('name').value = savedName;
                if (savedPhone) document.getElementById('phone').value = savedPhone;
            });
    
            // إخفاء رسائل الخطأ عند البدء بالكتابة
            document.getElementById('name').addEventListener('input', function() {
                document.getElementById('name-error').style.display = 'none';
            });
    
            document.getElementById('phone').addEventListener('input', function() {
                document.getElementById('phone-error').style.display = 'none';
            });
    
            document.getElementById('productNumber').addEventListener('input', function() {
                document.getElementById('productNumber-error').style.display = 'none';
            });
    
            // التحقق من النموذج
            function validateForm() {
                const name = document.getElementById('name').value;
                const phone = document.getElementById('phone').value;
                const productNumber = document.getElementById('productNumber').value;
    
                let isValid = true;
    
                if (!name) {
                    document.getElementById('name-error').style.display = 'block';
                    isValid = false;
                }
    
                if (!phone) {
                    document.getElementById('phone-error').style.display = 'block';
                    isValid = false;
                }
    
                if (!productNumber) {
                    document.getElementById('productNumber-error').style.display = 'block';
                    isValid = false;
                }
    
                if (isValid) {
                    sendEmail();
                }
            }
    
            // إرسال البريد الإلكتروني
            function sendEmail() {
                const name = document.getElementById('name').value;
                const phone = document.getElementById('phone').value;
                const productNumber = document.getElementById('productNumber').value;
    
                localStorage.setItem('name', name);
                localStorage.setItem('phone', phone);
    
                const email = "adger.shop@gmail.com";
                const subject = "طلب استرجاع منتج";
                const body = `الاسم: ${name}%0D%0Aرقم الهاتف: ${phone}%0D%0Aرقم المنتج: ${productNumber}`;
                const mailtoLink = `mailto:${email}?subject=${subject}&body=${body}`;
    
                window.location.href = mailtoLink;
            }
    
            // تحريك النموذج لأعلى عند التركيز على أي حقل إدخال
            const returnContainer = document.getElementById('returnContainer');
            const inputFields = document.querySelectorAll('.input-field');
    
            inputFields.forEach(input => {
                input.addEventListener('focus', () => {
                    returnContainer.style.transform = 'translateY(-100px)';
                });
    
                input.addEventListener('blur', () => {
                    returnContainer.style.transform = 'translateY(0)';
                });
            });
        </script>
    </body>
    </html>

<head>

.search-wrapper {
    margin-right: 7px;

}
}

            font-size: 12px;
            padding: 2px 6px;

        /* إخفاء العنصر على الهواتف */

            .cart-icon {
                margin-left: -10px;
                margin-right: -8px;
            }
        }
        @media only screen and (max-width: 767px) {
            .cart-icon {
                margin-left: -12px;
            }

        /* تعديلات النافذة الجانبية */
        .menu-popup {
            display: none;
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background-color: white;
            box-shadow: 2px 0 4px rgba(0, 0, 0, 0.1);
            padding: 20px;
            z-index: 1000;
            transition: left 0.3s ease-in-out;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from {
                left: -250px;
            }
            to {
                left: 0;
            }
        }

        @keyframes slideOut {
            from {
                left: 0;
            }
            to {
                left: -250px;
            }
        }

        .menu-popup.active {
            display: block;
            animation: slideIn 0.3s ease-in-out forwards;
        }

        .menu-popup.closing {

        /* تعديلات للهواتف */

</head>

<script>
    // 初始化购物车
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let cartCount = cart.length;

    // 更新购物车图标数量
    function updateCartCount() {
        const cartCountElement = document.querySelector('.cart-count');
        cartCountElement.textContent = cartCount;
    }

    // 添加商品到购物车
    function addToCart(button) {
        const productId = button.getAttribute('data-product-id');
        const product = {
            id: productId,
            name: document.querySelector(`[data-product-id="${productId}"]`).parentElement.querySelector('h1').textContent,
            price: document.querySelector(`[data-product-id="${productId}"]`).parentElement.querySelector('.number').textContent,
            image: document.querySelector(`[data-product-id="${productId}"]`).parentElement.querySelector('img').src
        };

        // 检查商品是否已存在于购物车
        const existingProduct = cart.find(item => item.id === productId);
        if (!existingProduct) {
            cart.push(product);
            cartCount = cart.length;
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
        }
    }

    // 导航到购物车页面
    function navigateToCart() {
        window.location.href = 'cart.html';
    }

    // 初始化页面时更新购物车数量
    updateCartCount();

    // 绑定购物车图标的点击事件
    document.querySelector('.cart-icon').addEventListener('click', navigateToCart);

    // دالة لإضافة المنتج إلى العربة
    function addToCart(button) {
        const productContainer = button.closest('.image-container');
        const product = {
            id: productContainer.querySelector('img').src, // استخدام الصورة كمعرف فريد
            image: productContainer.querySelector('img').src,
            name: productContainer.querySelector('h1').textContent,
            sold: productContainer.querySelector('h2').textContent,
            price: productContainer.querySelector('.number').textContent,
            discount: productContainer.querySelector('h3').textContent,
            link: productContainer.querySelector('a').href // حفظ رابط الصفحة المخصصة
        };

        // استرجاع العربة الحالية من localStorage
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        // التحقق مما إذا كان المنتج موجودًا بالفعل في العربة
        const existingProduct = cart.find(item => item.id === product.id);
        if (!existingProduct) {
            cart.push(product); // إضافة المنتج الجديد
            localStorage.setItem('cart', JSON.stringify(cart)); // 保存更新后的购物车
            updateCartCount();
        }
    }

    // دالة لتحديث عدد العناصر في العربة
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const cartCountElement = document.querySelector('.cart-count');
        cartCountElement.textContent = cart.length;
    }

    // 更新购物车数量时加载页面
    updateCartCount();
</script>



























<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشغيل صوت من فيديو يوتيوب وزر الصعود للأعلى</title>
    <style>
        /* تصميم الحاوية العمودية للأزرار */
        .button-container {
            position: fixed;
            bottom: 70px;
            left: 20px;
            width: 14px;
            background-color: #ffffff;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: none; /* إخفاء الأزرار حتى يتم التمرير */
            flex-direction: column; /* ترتيب العناصر عموديًا */
            gap: 11px; /* مسافة بين العناصر */
            justify-content: center; /* توسيط العناصر عموديًا */
            align-items: center; /* توسيط العناصر أفقيًا */
        }

        /* تصميم زر تشغيل الصوت */
        #playAudio {
            cursor: pointer;
            color: #333;
            font-size: 24px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            display: flex;
            align-items: center; /* محاذاة عمودية للعنصر */
            justify-content: center; /* محاذاة أفقية للعنصر */
            width: 100%; /* عرض كامل للحاوية */
        }

        #playIcon, #pauseIcon {
            font-size: 19px;
            fill: goldenrod;
            width: 16px;
            height: 16px;
            pointer-events: none; /* منع التأثيرات */
        }

        #pauseIcon {
            display: none; /* إخفاء أيقونة الإيقاف مؤقتًا */
        }

        /* تصميم زر الصعود للأعلى */
        .scroll-to-top {
            color: #333;
            font-size: 24px;
            cursor: pointer;
            text-align: center; /* محاذاة الأيقونة في الوسط */
            margin-top: -4px;
        }

        .scroll-to-top svg {
            width: 21px;
            height: 21;
            margin-bottom: -14px;
        }

        /* تصميم الخط الفاصل */
        .separator {
            width: 17px; /* عرض الخط */
            height: 2px; /* ارتفاع أطول لضمان رؤية واضحة */
            background-color: #ccc; /* لون الخط */
            align-self: center; /* توسيط الخط داخل الحاوية */
            margin-bottom: -18px;
            margin-top: -6px;
        }
    </style>
</head>
<body>

    <!-- الحاوية العمودية للأزرار -->
    <div class="button-container">
        <!-- زر تشغيل الصوت -->
        <div id="playAudio">
            <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <polygon points="6,4 20,12 6,20"/>
            </svg>

            <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <rect x="6" y="4" width="4" height="16" />
                <rect x="14" y="4" width="4" height="16" />
            </svg>
        </div>

        <!-- الخط الفاصل -->
        <div class="separator"></div>

        <!-- زر الصعود للأعلى -->
        <a href="#" class="scroll-to-top">
            <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m5 15 7-7 7 7"/>
            </svg>
        </a>
    </div>

    <!-- فيديو يوتيوب مع الرابط الجديد -->
    <iframe id="youtubeVideo" width="0" height="0" src="https://www.youtube.com/embed/YBr3ff5YCQk?enablejsapi=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>

    <script>
        var isPlaying = false;
        var playAudioBtn = document.getElementById('playAudio');

        // إظهار الأزرار فقط بعد التمرير لأسفل بعد تحميل الصفحة
        window.addEventListener('scroll', function() {
            var buttonContainer = document.querySelector('.button-container');
            if (window.scrollY > 100) {
                buttonContainer.style.display = 'flex';
            } else {
                buttonContainer.style.display = 'none';
            }
        });

        // تشغيل وإيقاف الفيديو من يوتيوب
        document.getElementById('playAudio').addEventListener('click', function() {
            var youtubeVideo = document.getElementById('youtubeVideo');
            var playIcon = document.getElementById('playIcon');
            var pauseIcon = document.getElementById('pauseIcon');

            if (!isPlaying) {
                youtubeVideo.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                youtubeVideo.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }

            isPlaying = !isPlaying;
        });

        // الانتقال إلى أعلى الصفحة بسرعة عند الضغط على زر الصعود
        document.querySelector('.scroll-to-top').addEventListener('click', function(event) {
            event.preventDefault();
            window.scrollTo({top: 0, behavior: 'auto'});
        });
    </script>

</body>
</html>
