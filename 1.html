    <!DOCTYPE html>
    <html lang="ar">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>معرض الصور</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                direction: rtl;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 55vh;
                margin: 0;
                background-color: #f4f4f4;
            }
    
            .gallery {
                display: flex;
                align-items: flex-start;
                flex-direction: row-reverse; /* تغيير الاتجاه لعرض المربعات الصغيرة على اليمين */
            }
    
            .main-image {
                margin-left: 20px; /* تغيير الهامش من اليمين إلى اليسار */
            }
    
            .main-image img {
                width: 400px;
                height: auto;
                border: 2px solid #ccc;
                border-radius: 10px;
            }
    
            .thumbnails {
                display: flex;
                flex-direction: column;
                max-height: 400px;
                overflow-y: scroll;
                padding-left: 10px; /* تغيير الهامش من اليمين إلى اليسار */
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
    
            .thumbnails::-webkit-scrollbar {
                display: none;
            }
    
            .thumbnail {
                margin: 10px 0;
                cursor: pointer;
                border: 2px solid #ccc;
                border-radius: 5px;
                padding: 5px;
            }
    
            .thumbnail img {
                width: 50px;
                height: auto;
                display: block;
            }
    
            .thumbnail.active {
                border-color: #007BFF;
            }
    
            /* التعديلات للهواتف */
            @media (max-width: 768px) {
                .gallery {
                    flex-direction: column;
                    align-items: center;
                margin-top: 22px;
            margin-right: 35px;
                }}
    
                .main-image {
                    margin-left: 0; /* إعادة تعيين الهامش */
                    margin-bottom: 20px;
                }
    
                .main-image img {
                    width: 100%;
                    max-width: 400px;
                }

                @media (max-width: 768px) {
                    .main-image img {
              width: 350px;
                }

    
                .thumbnails {
                    flex-direction: row;
                    max-height: none;
                    overflow-x: auto;
                    overflow-y: hidden;
                    padding-left: 0; /* إعادة تعيين الهامش */
                    width: 100%;
                    max-width: 400px;
                    gap: 10px; /* مسافة بين المربعات الصغيرة */
                }
                @media (max-width: 768px) {
                    .main-image img {
              width: 350px;
                }}
    
                .thumbnails  {
                    width: 350px;
                }
    
                .thumbnail img {
                    width: 50px; /* حجم المربعات الصغيرة */
                }
            }
        </style>
    </head>
    <body>
        <div class="gallery">
            <!-- الصورة الكبيرة في الأعلى -->
            <div class="main-image">
                <img id="mainImg" src="a1.jpg" alt="الصورة الرئيسية">
            </div>
    
            <!-- المربعات الصغيرة أسفل الصورة الكبيرة -->
            <div class="thumbnails">
                <div class="thumbnail active" onclick="changeImage('a1.jpg', this)">
                    <img src="a1.jpg" alt="الصورة 1">
                </div>
                <div class="thumbnail" onclick="changeImage('a2.jpg', this)">
                    <img src="a2.jpg" alt="الصورة 2">
                </div>
                <div class="thumbnail" onclick="changeImage('a3.jpg', this)">
                    <img src="a3.jpg" alt="الصورة 3">
                </div>
                <div class="thumbnail" onclick="changeImage('a4.jpg', this)">
                    <img src="a4.jpg" alt="الصورة 4">
                </div>
                <div class="thumbnail" onclick="changeImage('a5.jpg', this)">
                    <img src="a5.jpg" alt="الصورة 5">
                </div>
                <div class="thumbnail" onclick="changeImage('a6.jpg', this)">
                    <img src="a6.jpg" alt="الصورة 6">
                </div>
                <div class="thumbnail" onclick="changeImage('a7.jpg', this)">
                    <img src="a7.jpg" alt="الصورة 7">
                </div>
            </div>
        </div>
    
        <script>
            function changeImage(src, element) {
                // تغيير الصورة الرئيسية
                document.getElementById('mainImg').src = src;
    
                // إزالة الفئة "active" من جميع المربعات الصغيرة
                var thumbnails = document.querySelectorAll('.thumbnail');
                thumbnails.forEach(function(thumbnail) {
                    thumbnail.classList.remove('active');
                });
    
                // إضافة الفئة "active" إلى المربع الذي تم النقر عليه
                element.classList.add('active');
            }
        </script>
    </body>
    </html>

}

}

    <!DOCTYPE html>
    <html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>الصفحة الرئيسية</title>
        <style>
            /* التنسيق العام */
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background-color: #ffffff;
                padding-top: 66px; /* تعديل الحشو الأعلى بعد إزالة الشريط */
            }
    
            /* الشريط العلوي الثابت */
            .header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                height: 66px;
                background-color: white;
                padding: 0 20px;
                z-index: 1;
                box-shadow: 0 4px 4px -2px rgba(0, 0, 0, 0.1);
            }
    
            /* بقية التنسيقات كما هي */
            .search-wrapper {
                position: relative;
                width: 60%;
                max-width: 600px;
            }
    
            #search-box {
                width: 100%;
                padding: 10px 12px 10px 53px;
                font-size: 16px;
                border: 1px solid #000000;
                border-radius: 51px;
                outline: none;
                box-sizing: border-box;
                text-align: right;
                direction: rtl;
            }
    
            #search-button {
                position: absolute;
                left: 3px;
                top: 50%;
                transform: translateY(-50%);
                background-color: black;
                color: white;
                width: 40px;
                height: 34px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 33px;
                border: none;
                cursor: pointer;
            }
    
            #search-button svg {
                width: 20px;
                height: 20px;
                color: white;
            }
    
            .right-elements {
                display: flex;
                align-items: center;
                gap: 30px;
            }
    
            .right-elements span {
                font-size: 16px;
                color: #333;
            }
    
            .user-icon {
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 10px;
                margin-left: 20px;
                justify-content: center;
            }
    
            .user-icon svg {
                width: 24px;
                height: 24px;
                color: #333;
                flex-shrink: 0;
            }
    
            .welcome-message {
                font-size: 16px;
                color: #007bff;
                display: flex;
                align-items: center;
                gap: 5px;
            }
    
            .welcome-message span {
                font-weight: bold;
                color: #333;
            }
    
            .left-elements {
                display: flex;
                align-items: center;
                gap: 30px;
            }
    
            .menu-icon, .cart-icon, .message-button {
                cursor: pointer;
            }
    
            .menu-icon svg, .cart-icon svg, .message-button svg {
                width: 24px;
                height: 24px;
                color: #333;
            }
    
            .cart-icon {
                position: relative;
            }
    
            .cart-count {
                position: absolute;
                top: -8px;
                right: -8px;
                background-color: red;
                color: white;
                font-size: 12px;
                padding: 2px 6px;
                border-radius: 50%;
            }
    
            /* إخفاء العنصر على الهواتف */
            @media only screen and (max-width: 767px) {
                .cart-icon {
                    margin-left: -10px;
                }
            }
    
            /* تعديلات النافذة الجانبية */
            .menu-popup {
                display: none;
                position: fixed;
                top: 0;
                left: -250px;
                width: 250px;
                height: 100vh;
                background-color: white;
                box-shadow: 2px 0 4px rgba(0, 0, 0, 0.1);
                padding: 20px;
                z-index: 1000;
                transition: left 0.3s ease-in-out;
                overflow-y: auto;
            }
    
            @keyframes slideIn {
                from {
                    left: -250px;
                }
                to {
                    left: 0;
                }
            }
    
            @keyframes slideOut {
                from {
                    left: 0;
                }
                to {
                    left: -250px;
                }
            }
    
            .menu-popup.active {
                display: block;
                animation: slideIn 0.3s ease-in-out forwards;
            }
    
            .menu-popup.closing {
                animation: slideOut 0.3s ease-in-out forwards;
            }
    
            .menu-popup .back-arrow {
                cursor: pointer;
                margin-bottom: 20px;
            }
    
            .menu-popup .back-arrow svg {
                width: 24px;
                height: 24px;
                color: #333;
            }
    
            .menu-popup p {
                font-size: 18px;
                color: #333;
                cursor: pointer;
            }
    
            .menu-icon {
                margin-left: 10px;
            }
    
            /* إخفاء العنصر على الهواتف */
            @media only screen and (max-width: 767px) {
                .menu-icon {
                    margin-left: -6px;
                }
            }
    
            .adger {
                font-family: Arial, sans-serif;
                font-size: 27px;
                margin-left: 10px;
                font-weight: bold;
                background: linear-gradient(to right, #f37420, #ffc4c4);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                cursor: pointer;
                user-select: none;
            }
    
            @media (max-width: 767px) {
                .adger {
                    font-size: 20px;

            @media (min-width: 767px) {

            .container22 {
                display: flex;
                justify-content: center;
                align-items: center;
                text-align: center;
            }
    
            .country-code {
                display: inline-flex;
                align-items: center;
                font-size: 18px;
            }
    
            .flag {
                width: 24px;
                height: 16px;
                margin-left: 8px;
            }
        </style>
    </head>

                <div class="menu-icon" onclick="toggleMenu()">

        <!-- نافذة القائمة الجانبية -->
        <div class="menu-popup" id="menuPopup">
            <div class="back-arrow" onclick="toggleMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"></path>
                </svg>
            </div>
            <p onclick="window.location.href='account.html'">حسابي</p>
            <p onclick="window.location.href='about.html'">سياسات وأحكام</p>
        </div>
    
        <script>
            // استرجاع بيانات المستخدم من localStorage
            const username = localStorage.getItem('username');
    
            // عرض "أهلاً" مع اسم المستخدم أو نص بديل
            const welcomeMessage = document.getElementById('welcomeMessage');
            const usernameDisplay = document.getElementById('usernameDisplay');
    
            if (username) {
                usernameDisplay.textContent = username; // عرض اسم المستخدم
            } else {
                welcomeMessage.innerHTML = 'أهلاً، <span style="color: black; cursor: pointer;" onclick="window.location.href=\'account.html\'">سجل دخولك</span>';
            }
    
            // دالة لإظهار أو إخفاء القائمة الجانبية
            function toggleMenu() {
                const menuPopup = document.getElementById('menuPopup');
                if (menuPopup.classList.contains('active')) {
                    menuPopup.classList.remove('active');
                    menuPopup.classList.add('closing');
                    setTimeout(() => {
                        menuPopup.classList.remove('closing');
                        menuPopup.style.display = 'none';
                    }, 300); // يتناسب مع مدة animation
                } else {
                    menuPopup.style.display = 'block';
                    menuPopup.classList.add('active');
                }
            }
        </script>
    </body>

    <script>
        // 初始化购物车
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let cartCount = cart.length;
    
        // 更新购物车图标数量
        function updateCartCount() {
            const cartCountElement = document.querySelector('.cart-count');
            cartCountElement.textContent = cartCount;
        }
    
        // 添加商品到购物车
        function addToCart(button) {
            const productId = button.getAttribute('data-product-id');
            const product = {
                id: productId,
                name: document.querySelector(`[data-product-id="${productId}"]`).parentElement.querySelector('h1').textContent,
                price: document.querySelector(`[data-product-id="${productId}"]`).parentElement.querySelector('.number').textContent,
                image: document.querySelector(`[data-product-id="${productId}"]`).parentElement.querySelector('img').src
            };
    
            // 检查商品是否已存在于购物车
            const existingProduct = cart.find(item => item.id === productId);
            if (!existingProduct) {
                cart.push(product);
                cartCount = cart.length;
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
            }
        }
    
        // 导航到购物车页面
        function navigateToCart() {
            window.location.href = 'cart.html';
        }
    
        // 初始化页面时更新购物车数量
        updateCartCount();
    
        // 绑定购物车图标的点击事件
        document.querySelector('.cart-icon').addEventListener('click', navigateToCart);
    
        // دالة لإضافة المنتج إلى العربة
        function addToCart(button) {
            const productContainer = button.closest('.image-container');
            const product = {
                id: productContainer.querySelector('img').src, // استخدام الصورة كمعرف فريد
                image: productContainer.querySelector('img').src,
                name: productContainer.querySelector('h1').textContent,
                sold: productContainer.querySelector('h2').textContent,
                price: productContainer.querySelector('.number').textContent,
                discount: productContainer.querySelector('h3').textContent,
                link: productContainer.querySelector('a').href // حفظ رابط الصفحة المخصصة
            };
    
            // استرجاع العربة الحالية من localStorage
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            // التحقق مما إذا كان المنتج موجودًا بالفعل في العربة
            const existingProduct = cart.find(item => item.id === product.id);
            if (!existingProduct) {
                cart.push(product); // إضافة المنتج الجديد
                localStorage.setItem('cart', JSON.stringify(cart)); // 保存更新后的购物车
                updateCartCount();
            }
        }
    
        // دالة لتحديث عدد العناصر في العربة
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartCountElement = document.querySelector('.cart-count');
            cartCountElement.textContent = cart.length;
        }
    
        // 更新购物车数量时加载页面
        updateCartCount();
    </script>
