<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!DOCTYPE html>
    <html lang="ar">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>معرض الصور</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                direction: rtl;
                display: flex;
                flex-direction: column;
                align-items: center;
                margin: 0;
                background-color: #f4f4f4;
            }
    
            .gallery {
                display: flex;
                align-items: flex-start;
                flex-direction: row-reverse;
                margin-top: 20px;
            }
    
            .main-media {
                margin-left: 20px;
                position: relative;
            }
    
            .main-media img, .main-media video {
                width: 400px;
                height: 400px; /* ضبط الارتفاع ليتناسب مع الصور */
                border: 2px solid #ccc;
                border-radius: 10px;
                display: block;
            }
    
            .thumbnails {
                display: flex;
                flex-direction: column;
                max-height: 400px;
                overflow-y: scroll;
                padding-left: 10px;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
    
            .thumbnails::-webkit-scrollbar {
                display: none;
            }
    
            .thumbnail {
                margin: 10px 0;
                cursor: pointer;
                border: 2px solid #ccc;
                border-radius: 5px;
                padding: 5px;
                position: relative;
                width: 50px;
                height: 50px;
            }
    
            .thumbnail img, .thumbnail video {
                width: 100%;
                height: 100%;
                display: block;
                object-fit: cover;
            }
    
            .thumbnail.active {
                border-color: #007BFF;
            }
    
            .play-icon {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 24px;
                height: 24px;
                background-color: rgba(0, 0, 0, 0.5);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                pointer-events: none;
            }
    
            .play-icon svg {
                width: 16px;
                height: 16px;
                fill: white;
            }
    
            .share-button {
                position: absolute;
                left: 6px;
                background-color: rgba(122, 122, 122, 0.8);
                border: none;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            }
    
            .share-button.bottom {
                bottom: 10px;
            }
    
            .share-button.top {
                top: 10px;
            }
    
            .share-button svg {
                width: 24px;
                height: 24px;
            }
    
            @media (max-width: 555px) {
                .gallery {
                    flex-direction: column;
                    align-items: center;
                    margin-top: 22px;
                    margin-right: 1px;
                }
    
                .main-media {
                    margin-left: 0;
                    margin-bottom: 20px;
                }
    
                .main-media img, .main-media video {
                    width: 311px;
                    height: 311px; /* ضبط الارتفاع ليتناسب مع الصور */
                }
    
                .thumbnails {
                    flex-direction: row;
                    max-height: none;
                    overflow-x: auto;
                    overflow-y: hidden;
                    padding-left: 0;
                    width: 311px;
                    gap: 10px;
                }
    
                .thumbnail {
                    margin: 0;
                    flex: 0 0 auto;
                    width: 50px;
                    height: 50px;
                }
    
                .thumbnail img, .thumbnail video {
                    width: 100%;
                    height: 100%;
                }
            }
    
            .all-media {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-top: 20px;
                width: 100%;
            }
    
            .all-media img, .all-media video {
                width: 66%;
                height: auto;
                max-height: 444px;
                margin-bottom: 20px;
                border-radius: 10px;
            }
    
            @media (max-width: 555px) {
                .all-media img, .all-media video {
                    margin-bottom: 15px;
                    width: 100%;
                }
            }
    
            .content-below-main {
                margin-top: 20px;
                text-align: center;
                width: 100%;
                max-width: 600px;
            }
    
            .additional-content {
                margin-top: 20px;
                text-align: center;
                width: 100%;
                max-width: 600px;
                padding: 20px;
                background-color: #fff;
                border: 1px solid #ccc;
                border-radius: 10px;
            }
    
            .line {
                width: 100%;
                height: 8px;
                background-color: #eeeeee;
            }
        </style>
    </head>
    <body>
        <div class="gallery">
            <div class="main-media">
                <img id="mainMedia" src="" alt="الصورة الرئيسية" style="display: none;">
                <video id="mainVideo" controls style="display: none;">
                    <source src="" type="video/mp4">
                </video>
                <button class="share-button bottom" id="shareButton" onclick="sharePage()" style="color: #ffffff;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7 0-.24-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
                    </svg>
                </button>
            </div>
    
            <div class="thumbnails">
                <div class="thumbnail active" data-src="1.jpg" data-type="image">
                    <img src="" alt="الصورة 1">
                </div>
                <div class="thumbnail" data-src="a2.jpg" data-type="image">
                    <img src="" alt="الصورة 2">
                </div>
                <div class="thumbnail" data-src="a3.jpg" data-type="image">
                    <img src="" alt="الصورة 3">
                </div>
                <div class="thumbnail" data-src="a4.jpg" data-type="image">
                    <img src="" alt="الصورة 4">
                </div>
                <div class="thumbnail" data-src="a5.jpg" data-type="image">
                    <img src="" alt="الصورة 5">
                </div>
                <div class="thumbnail" data-src="a6.jpg" data-type="image">
                    <img src="" alt="الصورة 6">
                </div>
                <div class="thumbnail" data-src="a7.jpg" data-type="image">
                    <img src="" alt="الصورة 7">
                </div>
                <div class="thumbnail" data-src="video.mp4" data-type="video">
                    <video src=""></video>
                    <div class="play-icon">
                        <svg class="play-pause-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                            <path class="play-icon-path" d="M8 5v14l11-7z"/>
                            <path class="pause-icon-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" style="display: none;"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    
        <div class="all-media" id="allMedia"></div>
    
        <script>
            // تعيين مسارات الصور والفيديوهات عند تحميل الصفحة
            document.querySelectorAll('.thumbnail').forEach(thumbnail => {
                const src = thumbnail.getAttribute('data-src');
                const type = thumbnail.getAttribute('data-type');
                if (type === 'image') {
                    thumbnail.querySelector('img').src = src;
                } else if (type === 'video') {
                    thumbnail.querySelector('video').src = src;
                }
            });
    
            // تحديد الصورة الأولى كصورة رئيسية عند تحميل الصفحة
            const thumbnails = document.querySelectorAll('.thumbnail');
            const mainImg = document.getElementById('mainMedia');
            const mainVideo = document.getElementById('mainVideo');
            const shareButton = document.getElementById('shareButton');
    
            const firstThumbnail = thumbnails[0];
            const firstSrc = firstThumbnail.getAttribute('data-src');
            const firstType = firstThumbnail.getAttribute('data-type');
    
            if (firstType === 'image') {
                mainImg.src = firstSrc;
                mainImg.style.display = 'block';
                mainVideo.style.display = 'none';
            } else if (firstType === 'video') {
                mainVideo.querySelector('source').src = firstSrc;
                mainVideo.load();
                mainImg.style.display = 'none';
                mainVideo.style.display = 'block';
            }
    
            // تغيير الصورة الرئيسية أو الفيديو عند النقر على المربعات الصغيرة
            thumbnails.forEach(thumbnail => {
                thumbnail.addEventListener('click', function () {
                    if (!mainVideo.paused) {
                        mainVideo.pause();
                    }
    
                    const src = this.getAttribute('data-src');
                    const type = this.getAttribute('data-type');
    
                    if (type === 'image') {
                        mainImg.src = src;
                        mainImg.style.display = 'block';
                        mainVideo.style.display = 'none';
                        shareButton.classList.remove('top');
                        shareButton.classList.add('bottom');
                    } else if (type === 'video') {
                        mainVideo.querySelector('source').src = src;
                        mainVideo.load();
                        mainImg.style.display = 'none';
                        mainVideo.style.display = 'block';
                        shareButton.classList.remove('bottom');
                        shareButton.classList.add('top');
                    }
    
                    thumbnails.forEach(thumb => thumb.classList.remove('active'));
                    this.classList.add('active');
    
                    // تحريك المربعات الصغيرة إلى المربع المركز عليه
                    this.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                });
            });
    
            // التحكم في أيقونة التشغيل والإيقاف
            const mainVideoElement = document.getElementById('mainVideo');
            const playPauseIcon = document.querySelector('.play-pause-icon');
            const playIconPath = document.querySelector('.play-icon-path');
            const pauseIconPath = document.querySelector('.pause-icon-path');
    
            mainVideoElement.addEventListener('play', () => {
                playIconPath.style.display = 'none';
                pauseIconPath.style.display = 'block';
            });
    
            mainVideoElement.addEventListener('pause', () => {
                playIconPath.style.display = 'block';
                pauseIconPath.style.display = 'none';
            });
    
            // مشاركة الصفحة
            function sharePage() {
                if (navigator.share) {
                    navigator.share({
                        title: 'معرض الصور',
                        url: window.location.href
                    }).then(() => {
                        console.log('شكرًا للمشاركة!');
                    }).catch(console.error);
                } else {
                    alert('عذرًا، مشاركة الصفحة غير مدعومة في هذا المتصفح.');
                }
            }
    
            // إضافة الصور والفيديوهات بشكل تلقائي إلى العنصر الجديد
            const allMedia = document.getElementById('allMedia');
            thumbnails.forEach(thumbnail => {
                const src = thumbnail.getAttribute('data-src');
                const type = thumbnail.getAttribute('data-type');
    
                if (type === 'image') {
                    const img = document.createElement('img');
                    img.src = src;
                    allMedia.appendChild(img);
                } else if (type === 'video') {
                    const video = document.createElement('video');
                    video.controls = true;
                    video.innerHTML = `<source src="${src}" type="video/mp4">`;
                    allMedia.appendChild(video);
                }
            });
    
            // إضافة ميزة التمرير باللمس والفأرة للمربعات الصغيرة
            const thumbnailsContainer = document.querySelector('.thumbnails');
            let isDown = false;
            let startX, scrollLeft;
    
            thumbnailsContainer.addEventListener('mousedown', (e) => {
                isDown = true;
                startX = e.pageX - thumbnailsContainer.offsetLeft;
                scrollLeft = thumbnailsContainer.scrollLeft;
            });
    
            thumbnailsContainer.addEventListener('mouseleave', () => {
                isDown = false;
            });
    
            thumbnailsContainer.addEventListener('mouseup', () => {
                isDown = false;
            });
    
            thumbnailsContainer.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - thumbnailsContainer.offsetLeft;
                const walk = (x - startX) * 3; // السرعة
                thumbnailsContainer.scrollLeft = scrollLeft - walk;
            });
    
            thumbnailsContainer.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                scrollLeft = thumbnailsContainer.scrollLeft;
            });
    
            thumbnailsContainer.addEventListener('touchmove', (e) => {
                const x = e.touches[0].clientX;
                const walk = (x - startX) * 3; // السرعة
                thumbnailsContainer.scrollLeft = scrollLeft - walk;
            });
    
            thumbnailsContainer.addEventListener('touchend', () => {
                startX = null;
            });
        </script>
    </body>
    </html>

    <!DOCTYPE html>
    <html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>الصفحة الرئيسية</title>
        <style>
            /* التنسيق العام */
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background-color: #ffffff;
                padding-top: 66px; /* تعديل الحشو الأعلى بعد إزالة الشريط */
            }
    
            /* الشريط العلوي الثابت */
            .header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                height: 66px;
                background-color: white;
                padding: 0 20px;
                z-index: 1;
                box-shadow: 0 4px 4px -2px rgba(0, 0, 0, 0.1);
            }
    
            /* بقية التنسيقات كما هي */
            .search-wrapper {
                position: relative;
                width: 60%;
                max-width: 600px;
            }
    
            #search-box {
                width: 100%;
                padding: 10px 12px 10px 53px;
                font-size: 16px;
                border: 1px solid #000000;
                border-radius: 51px;
                outline: none;
                box-sizing: border-box;
                text-align: right;
                direction: rtl;
            }
    
            #search-button {
                position: absolute;
                left: 3px;
                top: 50%;
                transform: translateY(-50%);
                background-color: black;
                color: white;
                width: 40px;
                height: 34px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 33px;
                border: none;
                cursor: pointer;
            }
    
            #search-button svg {
                width: 20px;
                height: 20px;
                color: white;
            }
    
            .right-elements {
                display: flex;
                align-items: center;
                gap: 30px;
            }
    
            .right-elements span {
                font-size: 16px;
                color: #333;
            }
    
            .user-icon {
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 10px;
                margin-left: 20px;
                justify-content: center;
            }
    
            .user-icon svg {
                width: 24px;
                height: 24px;
                color: #333;
                flex-shrink: 0;
            }
    
            .welcome-message {
                font-size: 16px;
                color: #007bff;
                display: flex;
                align-items: center;
                gap: 5px;
            }
    
            .welcome-message span {
                font-weight: bold;
                color: #333;
            }
    
            .left-elements {
                display: flex;
                align-items: center;
                gap: 30px;
            }
    
            .menu-icon, .cart-icon, .message-button {
                cursor: pointer;
            }
    
            .menu-icon svg, .cart-icon svg, .message-button svg {
                width: 24px;
                height: 24px;
                color: #333;
            }
    
            .cart-icon {
                position: relative;
            }
    
            .cart-count {
                position: absolute;
                top: -8px;
                right: -8px;
                background-color: red;
                color: white;
                font-size: 12px;
                padding: 2px 6px;
                border-radius: 50%;
            }
    
            /* إخفاء العنصر على الهواتف */
            @media only screen and (max-width: 767px) {
                .cart-icon {
                    margin-left: -10px;
                }
            }
    
            /* تعديلات النافذة الجانبية */
            .menu-popup {
                display: none;
                position: fixed;
                top: 0;
                left: -250px;
                width: 250px;
                height: 100vh;
                background-color: white;
                box-shadow: 2px 0 4px rgba(0, 0, 0, 0.1);
                padding: 20px;
                z-index: 1000;
                transition: left 0.3s ease-in-out;
                overflow-y: auto;
            }
    
            @keyframes slideIn {
                from {
                    left: -250px;
                }
                to {
                    left: 0;
                }
            }
    
            @keyframes slideOut {
                from {
                    left: 0;
                }
                to {
                    left: -250px;
                }
            }
    
            .menu-popup.active {
                display: block;
                animation: slideIn 0.3s ease-in-out forwards;
            }
    
            .menu-popup.closing {
                animation: slideOut 0.3s ease-in-out forwards;
            }
    
            .menu-popup .back-arrow {
                cursor: pointer;
                margin-bottom: 20px;
            }
    
            .menu-popup .back-arrow svg {
                width: 24px;
                height: 24px;
                color: #333;
            }
    
            .menu-popup p {
                font-size: 18px;
                color: #333;
                cursor: pointer;
            }
    
            .menu-icon {
                margin-left: 10px;
            }
    
            /* إخفاء العنصر على الهواتف */
            @media only screen and (max-width: 767px) {
                .menu-icon {
                    margin-left: -6px;
                }
            }
    
            .adger {
                font-family: Arial, sans-serif;
                font-size: 27px;
                margin-left: 10px;
                font-weight: bold;
                background: linear-gradient(to right, #f37420, #ffc4c4);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                cursor: pointer;
                user-select: none;
            }
    
            @media (max-width: 767px) {
                .adger {
                    font-size: 20px;
                }
            }
    
            @media (min-width: 767px) {
                .adger {
                    margin-left: 10px;
                }
            }

        <!-- نافذة القائمة الجانبية -->
        <div class="menu-popup" id="menuPopup">
            <div class="back-arrow" onclick="toggleMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"></path>
                </svg>
            </div>
            <p onclick="window.location.href='account.html'">حسابي</p>
            <p onclick="window.location.href='about.html'">سياسات وأحكام</p>
        </div>
    
        <script>
            // استرجاع بيانات المستخدم من localStorage
            const username = localStorage.getItem('username');
    
            // عرض "أهلاً" مع اسم المستخدم أو نص بديل
            const welcomeMessage = document.getElementById('welcomeMessage');
            const usernameDisplay = document.getElementById('usernameDisplay');
    
            if (username) {
                usernameDisplay.textContent = username; // عرض اسم المستخدم
            } else {
                welcomeMessage.innerHTML = 'أهلاً، <span style="color: black; cursor: pointer;" onclick="window.location.href=\'account.html\'">سجل دخولك</span>';
            }
    
            // دالة لإظهار أو إخفاء القائمة الجانبية
            function toggleMenu() {
                const menuPopup = document.getElementById('menuPopup');
                if (menuPopup.classList.contains('active')) {
                    menuPopup.classList.remove('active');
                    menuPopup.classList.add('closing');
                    setTimeout(() => {
                        menuPopup.classList.remove('closing');
                        menuPopup.style.display = 'none';
                    }, 300); // يتناسب مع مدة animation
                } else {
                    menuPopup.style.display = 'block';
                    menuPopup.classList.add('active');
                }
            }
        </script>
    </body>

    <script>
        // 初始化购物车
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let cartCount = cart.length;
    
        // 更新购物车图标数量
        function updateCartCount() {
            const cartCountElement = document.querySelector('.cart-count');
            cartCountElement.textContent = cartCount;
        }
    
        // 添加商品到购物车
        function addToCart(button) {
            const productId = button.getAttribute('data-product-id');
            const product = {
                id: productId,
                name: document.querySelector(`[data-product-id="${productId}"]`).parentElement.querySelector('h1').textContent,
                price: document.querySelector(`[data-product-id="${productId}"]`).parentElement.querySelector('.number').textContent,
                image: document.querySelector(`[data-product-id="${productId}"]`).parentElement.querySelector('img').src
            };
    
            // 检查商品是否已存在于购物车
            const existingProduct = cart.find(item => item.id === productId);
            if (!existingProduct) {
                cart.push(product);
                cartCount = cart.length;
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
            }
        }
    
        // 导航到购物车页面
        function navigateToCart() {
            window.location.href = 'cart.html';
        }
    
        // 初始化页面时更新购物车数量
        updateCartCount();
    
        // 绑定购物车图标的点击事件
        document.querySelector('.cart-icon').addEventListener('click', navigateToCart);
    
        // دالة لإضافة المنتج إلى العربة
        function addToCart(button) {
            const productContainer = button.closest('.image-container');
            const product = {
                id: productContainer.querySelector('img').src, // استخدام الصورة كمعرف فريد
                image: productContainer.querySelector('img').src,
                name: productContainer.querySelector('h1').textContent,
                sold: productContainer.querySelector('h2').textContent,
                price: productContainer.querySelector('.number').textContent,
                discount: productContainer.querySelector('h3').textContent,
                link: productContainer.querySelector('a').href // حفظ رابط الصفحة المخصصة
            };
    
            // استرجاع العربة الحالية من localStorage
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            // التحقق مما إذا كان المنتج موجودًا بالفعل في العربة
            const existingProduct = cart.find(item => item.id === product.id);
            if (!existingProduct) {
                cart.push(product); // إضافة المنتج الجديد
                localStorage.setItem('cart', JSON.stringify(cart)); // 保存更新后的购物车
                updateCartCount();
            }
        }
    
        // دالة لتحديث عدد العناصر في العربة
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartCountElement = document.querySelector('.cart-count');
            cartCountElement.textContent = cart.length;
        }
    
        // 更新购物车数量时加载页面
        updateCartCount();
    </script>
