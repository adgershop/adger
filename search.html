<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة البحث</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .search-container {
            text-align: center;
        }
        input[type="text"] {
            width: 100%;
            max-width: 300px;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="ابحث هنا...">
</div>

<script>
    window.onload = function() {
        const searchBox = document.getElementById("searchBox");
        searchBox.focus(); // تركيز تلقائي على مربع البحث

        // التحقق مما إذا كان الجهاز هاتف محمول
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) {
            setTimeout(() => {
                searchBox.setSelectionRange(0, 0); // تحريك المؤشر لتحفيز لوحة المفاتيح
                searchBox.dispatchEvent(new Event('input', { bubbles: true })); // محاكاة إدخال نصي
            }, 200);
        }
    };
</script>

</body>
</html>
