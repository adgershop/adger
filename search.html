    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صندوق البحث</title>
</head>
<body>
    <h1>مرحبًا بك في صفحة البحث</h1>
    <form>
        <label for="search">بحث:</label>
        <input type="text" id="search" name="search" placeholder="اكتب هنا...">
    </form>

    <script>
        // عند تحميل الصفحة، يتم التركيز على صندوق البحث تلقائيًا
        window.onload = function() {
            document.getElementById('search').focus();
        };
    </script>
</body>
