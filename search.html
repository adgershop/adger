<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة البحث</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .search-container {
            text-align: center;
        }
        input[type="text"] {
            width: 100%;
            max-width: 300px;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
        /* زر وهمي لإجبار المتصفح على التفاعل */
        .hidden-button {
            position: absolute;
            top: -100px;
            left: -100px;
            opacity: 0;
        }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="ابحث هنا...">
    <button id="fakeButton" class="hidden-button">اضغط</button> <!-- زر وهمي -->
</div>

<script>
    window.onload = function() {
        const searchBox = document.getElementById("searchBox");
        const fakeButton = document.getElementById("fakeButton");

        // إضافة حدث "نقر" تلقائي على الزر الوهمي
        fakeButton.click();

        // تأخير بسيط لضمان تنفيذ النقر قبل التركيز
        setTimeout(() => {
            searchBox.focus();
        }, 300);
    };
</script>

</body>
</html>
