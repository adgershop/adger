<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الصور</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            direction: rtl;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            background-color: #f4f4f4;
        }

        
        .line {
            width: 100%;
            height: 8px;
            background-color: #eeeeee;
        }
        
        .gallery {
            display: flex;
            align-items: flex-start;
            flex-direction: row-reverse;
            margin-top: 20px;
            position: relative;
        }

        .main-media {
            margin-left: 20px;
            position: relative;
        }

        .main-media img, .main-media video {
            width: 400px;
            height: 400px;
            border: 2px solid #ccc;
            border-radius: 10px;
            display: block;
        }

        .main-media video:fullscreen {
            border: none;
        }

        .thumbnails {
            display: flex;
            flex-direction: column;
            max-height: 400px;
            overflow-y: scroll;
            padding-left: 10px;
            scrollbar-width: none; /* إخفاء شريط التمرير */
            -ms-overflow-style: none;
        }

        .thumbnails::-webkit-scrollbar {
            display: none; /* إخفاء شريط التمرير في WebKit */
        }

        .thumbnail {
            margin: 10px 0;
            cursor: pointer;
            border: 2px solid #ccc;
            border-radius: 1px;
            padding: 0;
            position: relative;
            width: 66px;
            height: 66px;
            box-sizing: border-box;
        }

        .thumbnail img, .thumbnail video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            margin: 0;
            padding: 0;
        }

        .thumbnail.active {
            border-color: #ff0000;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .play-icon svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .share-button {
            position: absolute;
            left: 11px;
            background-color: rgba(121, 121, 121, 0.8);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .share-button.bottom {
            bottom: 11px;
        }

        .share-button.top {
            top: 10px;
            display: none;
        }

        .share-button svg {
            width: 24px;
            height: 24px;
        }

        @media (max-width: 555px) {
            .gallery {
                flex-direction: column;
                align-items: center;
                margin-top: 22px;
                margin-right: 1px;
            }

            .main-media {
                margin-left: 0;
                margin-bottom: 20px;
            }

            .main-media img, .main-media video {
                width: 311px;
                height: 311px;
            }

            .thumbnails {
                flex-direction: row;
                max-height: none;
                overflow-x: auto;
                overflow-y: hidden;
                padding-left: 0;
                width: 311px;
                white-space: nowrap; /* منع التفاف الصور */
                gap: 10px;
            }

            .thumbnail {
                margin: 0;
                flex: 0 0 auto;
                width: 65px;
                height: 65px;
            }
        }

        .media-counter {
            position: absolute;
            font-family: 'Cairo', sans-serif;
            bottom: 12px;
            right: 90px;
            background-color: rgba(255, 255, 255, 0.767);
            padding: 2px 12px;
            border-radius: 15px;
            font-size: 13px;
            direction: rtl;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 555px) {
            .media-counter {
                bottom: 95px;
                right: 15px;
                font-size: 11px;
                padding: 3px 13px;
            }
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(24, 24, 24, 0.336);
            border: none;
            border-radius: 1px;
            width: 41px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            z-index: 1;
        }

        .arrow.left {
            left: 2px;
        }

        .arrow.right {
            right: 2px;
        }

        .arrow svg {
            fill: white;
            width: 30px;
            height: 34px;
        }

        .arrow.disabled {
            background-color: rgba(66, 66, 66, 0.253);
            cursor: not-allowed;
        }

        @media (max-width: 556px) {
            .arrow {
                display: none;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
</head>
<body>
    <div class="gallery">
        <div class="main-media">
            <img id="mainMedia" src="1.jpg" alt="الصورة الرئيسية">
            <video id="mainVideo" controls style="display: none;">
                <source src="3e.mp4" type="video/mp4">
            </video>
            <button class="share-button bottom" id="shareButton" onclick="sharePage()" style="color: #ffffff;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7 0-.24-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
                </svg>
            </button>
            <button class="arrow left" onclick="prevMedia()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                </svg>
            </button>
            <button class="arrow right" onclick="nextMedia()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z" />
                </svg>
            </button>
        </div>
        <div class="media-counter">
            منتج <span id="currentMedia">1</span>/<span id="totalMedia">8</span>
        </div>
        <div class="thumbnails">
            <div class="thumbnail active" data-src="1.jpg" data-type="image">
                <img src="1.jpg" alt="الصورة 1">
            </div>
            <div class="thumbnail" data-src="a2.jpg" data-type="image">
                <img src="a2.jpg" alt="الصورة 2">
            </div>
            <div class="thumbnail" data-src="a3.jpg" data-type="image">
                <img src="a3.jpg" alt="الصورة 3">
            </div>
            <div class="thumbnail" data-src="a4.jpg" data-type="image">
                <img src="a4.jpg" alt="الصورة 4">
            </div>
            <div class="thumbnail" data-src="a5.jpg" data-type="image">
                <img src="a5.jpg" alt="الصورة 5">
            </div>
            <div class="thumbnail" data-src="a6.jpg" data-type="image">
                <img src="a6.jpg" alt="الصورة 6">
            </div>
            <div class="thumbnail" data-src="a7.jpg" data-type="image">
                <img src="a7.jpg" alt="الصورة 7">
            </div>
            <div class="thumbnail" data-src="3e.mp4" data-type="video">
                <video src="3e.mp4"></video>
                <div class="play-icon">
                    <svg class="play-pause-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path class="play-icon-path" d="M8 5v14l11-7z"/>
                        <path class="pause-icon-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" style="display: none;"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateTotalMedia() {
            const totalMedia = document.querySelectorAll('.thumbnail').length;
            document.getElementById('totalMedia').textContent = totalMedia;
        }

        function updateCurrentMedia() {
            const thumbnails = document.querySelectorAll('.thumbnail');
            let currentIndex = 0;
            thumbnails.forEach((thumb, index) => {
                if (thumb.classList.contains('active')) {
                    currentIndex = index + 1;
                }
            });
            document.getElementById('currentMedia').textContent = currentIndex;
            updateArrowState(currentIndex, thumbnails.length);
        }

        function updateMainMedia(thumbnail) {
            const mainImage = document.getElementById('mainMedia');
            const mainVideo = document.getElementById('mainVideo');
            const shareButton = document.getElementById('shareButton');
            const src = thumbnail.getAttribute('data-src');
            const type = thumbnail.getAttribute('data-type');

            if (type === 'image') {
                mainImage.src = src;
                mainImage.style.display = 'block';
                mainVideo.style.display = 'none';
                mainVideo.pause();
                shareButton.style.display = 'flex'; // إظهار زر المشاركة للصور
            } else if (type === 'video') {
                mainVideo.querySelector('source').src = src;
                mainVideo.load();
                mainVideo.style.display = 'block';
                mainImage.style.display = 'none';
                shareButton.style.display = 'none'; // إخفاء زر المشاركة للفيديو
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            calculateTotalMedia();
            updateCurrentMedia();
            const initialThumbnail = document.querySelector('.thumbnail.active');
            updateMainMedia(initialThumbnail);

            const mainMediaContainer = document.querySelector('.main-media');
            const hammer = new Hammer(mainMediaContainer);

            hammer.on('swipeleft', function() {
                nextMedia();
            });

            hammer.on('swiperight', function() {
                prevMedia();
            });
        });

        document.querySelectorAll('.thumbnail').forEach(thumb => {
            thumb.addEventListener('click', () => {
                document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                thumb.classList.add('active');
                updateMainMedia(thumb);
                setTimeout(updateCurrentMedia, 100);
            });
        });

        function nextMedia() {
            const thumbnails = document.querySelectorAll('.thumbnail');
            let currentIndex = -1;
            thumbnails.forEach((thumb, index) => {
                if (thumb.classList.contains('active')) {
                    currentIndex = index;
                }
            });
            if (currentIndex < thumbnails.length - 1) {
                thumbnails[currentIndex].classList.remove('active');
                thumbnails[currentIndex + 1].classList.add('active');
                updateMainMedia(thumbnails[currentIndex + 1]);
                setTimeout(updateCurrentMedia, 100);
            }
        }

        function prevMedia() {
            const thumbnails = document.querySelectorAll('.thumbnail');
            let currentIndex = -1;
            thumbnails.forEach((thumb, index) => {
                if (thumb.classList.contains('active')) {
                    currentIndex = index;
                }
            });
            if (currentIndex > 0) {
                thumbnails[currentIndex].classList.remove('active');
                thumbnails[currentIndex - 1].classList.add('active');
                updateMainMedia(thumbnails[currentIndex - 1]);
                setTimeout(updateCurrentMedia, 100);
            }
        }

        const lastVideoThumbnail = document.querySelector('.thumbnail[data-type="video"]:last-child');
        const mediaCounter = document.querySelector('.media-counter');

        lastVideoThumbnail.addEventListener('click', () => {
            mediaCounter.style.display = 'none';
        });

        lastVideoThumbnail.querySelector('video').addEventListener('play', () => {
            mediaCounter.style.display = 'none';
        });

        lastVideoThumbnail.querySelector('video').addEventListener('pause', () => {
            mediaCounter.style.display = 'flex';
        });

        lastVideoThumbnail.querySelector('video').addEventListener('ended', () => {
            mediaCounter.style.display = 'flex';
        });

        document.querySelectorAll('.thumbnail:not([data-type="video"])').forEach(thumb => {
            thumb.addEventListener('click', () => {
                mediaCounter.style.display = 'flex';
            });
        });

        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: document.title,
                    url: window.location.href
                }).catch(err => console.log('Error sharing:', err));
            } else {
                console.log('Web Share API not supported');
            }
        }

        document.querySelectorAll('.main-media img, .main-media video').forEach(media => {
            media.addEventListener('touchstart', (event) => {
                event.stopPropagation();
            });

            media.addEventListener('touchmove', (event) => {
                event.stopPropagation();
            });
        });

        function updateArrowState(currentIndex, totalMedia) {
            const leftArrow = document.querySelector('.arrow.left');
            const rightArrow = document.querySelector('.arrow.right');

            if (currentIndex === 1) {
                leftArrow.classList.add('disabled');
            } else {
                leftArrow.classList.remove('disabled');
            }

            if (currentIndex === totalMedia) {
                rightArrow.classList.add('disabled');
            } else {
                rightArrow.classList.remove('disabled');
            }
        }
    </script>
</body>
</html>
