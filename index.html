<!DOCTYPE html>
<html lang="ar">
<head>

    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            direction: rtl;
        }

        .product {
            margin-bottom: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .product-info {
            float: right;
            width: calc(100% - 200px);
        }

        .copy-button {
            background-color: #383f3e;
            border: none;
            color: white;
            padding: 8px 16px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
            float: left;
        }

        .search-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .search-bar {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
            font-size: 16px;
        }

        .product-images {
            float: left;
            width: 150px;
            height: 150px;
            overflow: hidden;
            position: relative;
        }

        .product-images img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .lightbox img {
            max-width: 80%;
            max-height: 80%;
            cursor: pointer;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="search-container">
    <input type="text" id="searchInput" onkeyup="searchProducts()" class="search-bar" placeholder="ابحث في ADGER...">
</div>
<p>ابعت رقم المنتج والوكيشن عند الضغط على زر ارسال رسالة واتساب , سعر التوصيل 30ج🛒</p>

</div>

<script>
    function copyText(text) {
        navigator.clipboard.writeText(text)
        .then(() => {
            alert('تم نسخ النص: ' + text);
        })
        .catch(err => {
            console.error('Failed to copy text: ', err);
        });
    }

    function openLightbox(imageUrl) {
        var lightbox = document.getElementById('lightbox');
        var image = lightbox.querySelector('img');
        image.src = imageUrl;
        lightbox.style.display = 'flex';
    }

    function closeLightbox() {
        var lightbox = document.getElementById('lightbox');
        lightbox.style.display = 'none';
    }

    function searchProducts() {
        var input, filter, products, product, i, txtValue;
        input = document.getElementById('searchInput');
        filter = input.value.toUpperCase();
        products = document.getElementById('productContainer');
        product = products.getElementsByClassName('product');

        for (i = 0; i < product.length; i++) {
            var productInfo = product[i].getElementsByClassName("product-info")[0];
            txtValue = productInfo.textContent || productInfo.innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
                product[i].style.display = "";
            } else {
                product[i].style.display = "none";
            }
        }
    }
</script>
</body>
