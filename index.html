    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Search Box with Clear Button</title>
        <style>
            body, html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
            }
            .black-line {
                width: 100%;
                height: 60px;
                background-color: #2b3336;
                display: flex;
                justify-content: center;
                align-items: center;
                position: absolute;
                top: 0;
                left: 0;
            }
            .search-box-container {
                position: relative;
                width: 55%;
            }
            .search-box {
                width: 100%;
                padding: 10px;
                padding-left: 32px;
                font-size: 16px;
                border-radius: 22px;
                border: 1px solid #ff5e00;
                text-align: right;
                position: relative;
                direction: rtl; /* يجعل النص يبدأ من اليمين */
                border-radius: 14px;
            }
    
            .clear-button {
                position: absolute;
                left: 10px;
                top: 50%;
                transform: translateY(-50%);
                background: transparent;
                border: none;
                font-size: 22px;
                cursor: pointer;
                display: none; /* زر الإكس مخفي افتراضياً */
            }
            .suggestions-box {
    display: none;
    position: absolute;
    margin-top: 5px; /* مسافة بسيطة بين الصندوق وصندوق البحث */
    top: 100%;
    left: 0;
    right: -43px; /* يضمن أن العرض مطابق للصندوق */
    background: #ffffff;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    border-radius: 8px;
    z-index: 10;
    text-align: right;
    box-sizing: border-box; /* لضمان توافق العرض مع الحواف */
}

            .suggestions-box ul {
                list-style: none;
                margin: 0;
                padding: 10px;
            }
            .suggestions-box li {
                padding: 8px;
                font-size: 14px;
                cursor: pointer;
                color: #333;
            }
            .suggestions-box li:hover {
                background-color: #f0f0f0;
            }
        </style>
    </head>
    <body>
        <div class="black-line">
            <div class="search-box-container">
                <input type="text" class="search-box" placeholder="ابحث فى أدجر" id="searchBox" 
                    onfocus="showSuggestions()" 
                    onblur="hideSuggestions()" 
                    oninput="handleInput()">
                <button class="clear-button" onmousedown="clearSearch()" id="clearButton">×</button>
                <div class="suggestions-box" id="suggestionsBox">
                    <ul>
                        <li>كلمة بحثية 1</li>
                        <li>كلمة بحثية 2</li>
                        <li>كلمة بحثية 3</li>
                    </ul>
                </div>
            </div>
        </div>
    
        <script>
            let isClearing = false; // Flag to track if the clear button is clicked
    
            function handleInput() {
                const searchBox = document.getElementById('searchBox');
                const suggestionsBox = document.getElementById('suggestionsBox');
                const clearButton = document.getElementById('clearButton');
    
                if (searchBox.value.trim()) {
                    suggestionsBox.style.display = 'none'; // Hide suggestions when typing
                    clearButton.style.display = 'block';  // Show the clear button only if input is not empty
                } else {
                    suggestionsBox.style.display = 'block'; // Show suggestions if input is empty
                    clearButton.style.display = 'none';    // Hide the clear button if input is empty
                }
            }
    
            function showSuggestions() {
                const searchBox = document.getElementById('searchBox');
                const suggestionsBox = document.getElementById('suggestionsBox');
    
                if (!searchBox.value.trim()) {
                    suggestionsBox.style.display = 'block'; // Show suggestions only if input is empty
                }
            }
    
            function hideSuggestions() {
                if (!isClearing) { // Only hide suggestions if not clearing
                    setTimeout(() => {
                        const suggestionsBox = document.getElementById('suggestionsBox');
                        suggestionsBox.style.display = 'none';
                    }, 200); // Delay to allow clicking on suggestions if needed
                }
            }
    
            function clearSearch() {
                isClearing = true; // Set the flag to true
                const searchBox = document.getElementById('searchBox');
                const suggestionsBox = document.getElementById('suggestionsBox');
                const clearButton = document.getElementById('clearButton');
                searchBox.value = '';
                suggestionsBox.style.display = 'none'; // Hide suggestions after clearing
                clearButton.style.display = 'none';    // Hide the clear button after clearing
                setTimeout(() => {
                    searchBox.focus(); // Keep focus on the search box
                    isClearing = false; // Reset the flag
                }, 0);
            }
    
            document.getElementById('searchBox').addEventListener('keypress', function (event) {
                if (event.key === 'Enter') {
                    this.blur(); // إزالة التركيز من صندوق البحث
                }
            });
        </script>
    </body>
    </html>
    



    
    
    <!DOCTYPE html>
    <html lang="ar">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Navigation Bar</title>
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
        <style>
            .navbar {
                display: flex;
                align-items: center;
                background-color: rgb(59, 73, 83);
                height: 45px;
                position: relative;
                margin-top: 60px;
                flex-direction: row-reverse;
            }
            .navbar-item {
                color: white;
                padding: 0 11px;
                cursor: pointer;
                font-family: 'Cairo', sans-serif;
            }
            .highlight {
                position: absolute;
                bottom: 0;
                right: 0;
                height: 3px;
                background-color: rgb(255, 255, 255);
                transition: all 0.3s ease;
            }
            @media (max-width: 1468px) {
                .highlight  {
            background-color: #ff5100;
 }
}
        </style>
    </head>
    <body>
    
    <div class="navbar">
        <div class="navbar-item" onclick="moveHighlight(this)" style="color: #ffe600; ">استكشف</div>
        <div class="navbar-item" onclick="moveHighlight(this)">هواتف</div>
        <div class="navbar-item" onclick="moveHighlight(this)">ساعات</div>
        <div class="navbar-item" onclick="moveHighlight(this)">كتب</div>
        <div class="highlight"></div>
    </div>
    
    <script>
        function moveHighlight(element) {
            const highlight = document.querySelector('.highlight');
            const navbar = document.querySelector('.navbar');
            highlight.style.width = element.offsetWidth + 'px';
            highlight.style.right = (navbar.offsetWidth - (element.offsetLeft + element.offsetWidth)) + 'px';
        }
    
        // تحديد العنصر "استكشف" تلقائيًا عند تحميل الصفحة
        window.onload = function() {
            const defaultItem = document.querySelector('.navbar-item');
            if (defaultItem) {
                moveHighlight(defaultItem);
            }
        }
    </script>
    
    </body>
    </html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Slideshow</title>
<style>
 .white-bar {
     height: 26px;
     background-color: white;
     text-align: center;
     margin-bottom: 20px;
 }

 .content {
     max-width: 800px;
     margin: 0 auto;
     padding: 20px;
     position: relative;   
     top: -6px;   
 }
 @media (min-width: 1469px) {
    .content  {
display: none;
 }
}

 .slideshow-container {
     position: relative;
     overflow: hidden; /* لإخفاء الصور أثناء السحب */
     
 }

 .slides {
 width: 100%;
 height: 199px;
 display: none;
 border-radius: 9px;
}

/* لتصغير الارتفاع على الهواتف المحمولة */
@media (max-width: 768px) {
 .slides {
     height: 150px; /* تعديل الارتفاع حسب احتياجك */
 }
}

 .slides.active {
     display: block;
 }

 .close-btn {
     position: absolute;
     top: -2px;
     right: 1px;
     background-color: rgb(238, 1, 1);
     color: rgb(255, 255, 255);
     border: none;
     padding: 3px 7px;
     cursor: pointer;
     z-index: 1;
     font-size: 10px;
 }

 .spacing {
     height: 2em;
 }
</style>
 <div class="content" id="content">
     <!-- عرض الصور -->
     <div class="slideshow-container" id="slideshow-container">
         <img class="slides active" src="i1.jpg">
         <img class="slides" src="i2.jpg">
         <img class="slides" src="i3.jpg">
         <a href="https://median.co/share/wjpxwm#apk">
             <img class="slides" src="i4.jpg" alt="تطبيق أدجر">
         </a>
         
     </div>
 </div>

 <script src="https://hammerjs.github.io/dist/hammer.min.js"></script>
 <script>
     let slideIndex = 0;
     let slides = document.getElementsByClassName("slides");
     let slideshowContainer = document.getElementById("slideshow-container");

     // وظيفة لتغيير الشريحة
     function changeSlide(n) {
         slides[slideIndex].style.display = "none";
         slideIndex = (slideIndex + n + slides.length) % slides.length;
         slides[slideIndex].style.display = "block";
     }

     // تشغيل عرض الصور تلقائيا
     setInterval(() => changeSlide(1), 7000); // تغيير الصورة كل 5 ثواني

     // وظيفة إزالة الخلفية الزرقاء بكل محتوياتها
     function removeContent() {
         let content = document.getElementById("content");
         if (content) {
             content.style.display = "none";
         }

         // إضافة مسافة تعادل 2 <br> عند إخفاء المحتوى
         let spacing = document.getElementById('spacing');
if (!spacing) {
 spacing = document.createElement('div');
 spacing.className = 'spacing';
 spacing.id = 'spacing';
 spacing.style.marginBottom = '-2em'; // إضافة مسافة تعادل سطر فارغ
 document.body.insertBefore(spacing, document.querySelector('.white-bar').nextSibling);
}

     }

     // وظيفة لعرض المحتوى مرة أخرى وإزالة المسافة
     function showContent() {
         let content = document.getElementById("content");
         if (content) {
             content.style.display = "block";
         }

         // إزالة المسافة المضافة
         let spacing = document.getElementById('spacing');
         if (spacing) {
             spacing.remove();
         }
     }

     // وظيفة لإخفاء المحتوى عند الكتابة وإظهاره عند حذف الكتابة
     function handleInput(event) {
         if (event.target.value.trim() === "") {
             showContent();
         } else {
             removeContent();
         }
     }

     // إضافة مستمع الحدث لصندوق البحث
     window.addEventListener('load', () => {
         const searchBox = document.querySelector('input[type="text"]'); // تعديل هذا لاختيار صندوق البحث الخاص بك
         if (searchBox) {
             searchBox.addEventListener('input', handleInput);
         }
     });

     // استخدام Hammer.js للاستماع إلى أحداث السحب
     const hammertime = new Hammer(slideshowContainer);
     hammertime.on('swipeleft', () => changeSlide(1));
     hammertime.on('swiperight', () => changeSlide(-1));
 </script>
</body>
</html>
